name: Sonatype Lifecycle Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonatype-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar evaluación Sonatype Lifecycle
        id: evaluate
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: https://ae-saas.sonatype.app/platform
          username: ${{ secrets.LIFECYCLE_USERNAME }}
          password: ${{ secrets.LIFECYCLE_PASSWORD }}
          application-id: ${{ secrets.LIFECYCLE_ORG_ID }}
          scan-targets: .   # o el path de tu artefacto

      - name: Ver resultados
        run: echo "Scan ID: ${{ steps.evaluate.outputs.scan-id }} | URL: ${{ steps.evaluate.outputs.report-url }}"
