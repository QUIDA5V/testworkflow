name: Sonatype Lifecycle Scan
on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonatype-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sonatype scan via Maven plugin
        run: |
          mvn com.sonatype.clm:clm-maven-plugin:evaluate \
            -Dclm.serverUrl=https://ae-saas.sonatype.app/platform \
            -Dclm.username=${{ secrets.LIFECYCLE_USERNAME }} \
            -Dclm.password=${{ secrets.LIFECYCLE_PASSWORD }} \
            -Dclm.applicationId=123456
